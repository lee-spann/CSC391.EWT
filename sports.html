<html>

<head>
  <meta charset="utf-8">
  <link rel="icon" href="pix/ico/favicon.ico">
  <link rel="stylesheet" href="style.css">
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <title>A-Frame Starter</title>
</head>

<body>
  <a-scene>

 <a-assets>
    <!-- textures -->
  <img id="basketballTex" src="basketballTexture.avif">
  <img id="tennisTex" src="tennisTexture.jpg">
  <img id="beachballTex" src="beachballTexture.webp">
  <img id="barkTex" src="barkTexture.jpg">
  <img id="grassTex" src="grassTexture.jpg">
  <img id="treeTex" src="treeTexture.jpg">
</a-assets>

    </a-assets>

    <!--camera-->
    <a-entity camera position="0 2 4" look-controls></a-entity>

    <!--lights-->
    <a-light type="ambient" intensity="0.6"></a-light>
    <a-light type="directional" position="1 4 2" intensity="0.8"></a-light>

    <!--court / floor-->
    <a-entity 
      geometry="primitive: plane; width: 12; height: 12" 
      material="src: #grassTex" 
      position="0 0 -4"
      rotation="-90 0 0">
    </a-entity>

    <!--basketball-->
    <a-entity 
      geometry="primitive: sphere; radius: 0.35" 
      material="src: #basketballTex" 
      position="-1 0.35 -3"
      animation="property: position; 
                 from: -1 0.35 -3; 
                 to: -1 1.4 -3; 
                 dir: alternate; 
                 loop: true; 
                 dur: 700; 
                 easing: easeInQuad">
    </a-entity>

    <!--tennis ball-->
    <a-entity 
      geometry="primitive: sphere; radius: 0.15" 
      material= "src: #tennisTex" 
      position="0 0.15 -3"
      animation="property: position; 
                 from: 0 0.15 -3; 
                 to: 0 0.9 -3; 
                 dir: alternate; 
                 loop: true; 
                 dur: 500; 
                 easing: easeInQuad">
    </a-entity>

    <!--beach ball-->
    <a-entity 
      geometry="primitive: sphere; radius: 0.5" 
      material="src: #beachballTex" 
      position="1 0.5 -3"
      animation="property: position; 
                 from: 1 0.5 -3; 
                 to: 1 1.6 -3; 
                 dir: alternate; 
                 loop: true; 
                 dur: 1200; 
                 easing: easeInQuad">
    </a-entity>

    <!--sky-->
    <a-sky color="#87CEEB"></a-sky>

    <!--tree trunk-->
<a-entity
  geometry="primitive: cylinder; radius: 0.2; height: 2"
  material="color: #barkTex"
  position="3 1 -8">
</a-entity>

<!--tree leaves-->
<a-entity
  geometry="primitive: sphere; radius: 1"
  material="src: #treeTex"
  position="3 2.5 -8">
</a-entity>


  </a-scene>
</body>

</html>
