<html>
<head>
  <meta charset="utf-8">
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <title>Basketball Scene</title>
</head>

<body>
<a-scene>

  <a-assets>
    <img id="courtTexture" src="court.jpg.avif">
    <img id="ballTexture" src="basketball.jpg.webp">
  </a-assets>

  <a-sky color="#1e3d59"></a-sky>

  <a-entity position="0 5 15">
    <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

  <a-light type="ambient" intensity="0.8"></a-light>
  <a-light type="directional" position="5 10 5" intensity="1"></a-light>

  <!-- COURT -->
  <a-plane rotation="-90 0 0" width="30" height="30" src="#courtTexture"></a-plane>

  <!-- LEFT HOOP - faces center -->
  <a-box position="-14 0.5 0" width="1" height="1" depth="1" color="#444"></a-box>
  <a-cylinder position="-14 3 0" radius="0.15" height="6" color="#555"></a-cylinder>

  <a-box 
    position="-13.4 5 0" 
    width="3" 
    height="2" 
    depth="0.1" 
    rotation="0 90 0" 
    color="#eeeeee">
  </a-box>

  <a-torus 
    position="-13.1 4 0" 
    radius="0.5" 
    radius-tubular="0.06"
    rotation="90 90 0" 
    color="orange">
  </a-torus>

  <a-cylinder 
    position="-13.1 3.6 0"
    radius="0.5"
    height="0.9"
    rotation="0 0 0"
    color="#ffffff"
    opacity="0.35"
    segments-radial="12">
  </a-cylinder>

  <!-- RIGHT HOOP - faces center -->
  <a-box position="14 0.5 0" width="1" height="1" depth="1" color="#444"></a-box>
  <a-cylinder position="14 3 0" radius="0.15" height="6" color="#555"></a-cylinder>

  <a-box 
    position="13.4 5 0" 
    width="3" 
    height="2" 
    depth="0.1" 
    rotation="0 90 0" 
    color="#eeeeee">
  </a-box>

  <a-torus 
    position="13.1 4 0" 
    radius="0.5" 
    radius-tubular="0.06"
    rotation="90 90 0" 
    color="orange">
  </a-torus>

  <a-cylinder 
    position="13.1 3.6 0"
    radius="0.5"
    height="0.9"
    color="#ffffff"
    opacity="0.35"
    segments-radial="12">
  </a-cylinder>

  <!-- PLAYER - facing left hoop -->
  <a-entity id="player" position="0 0 0" rotation="0 90 0" scale="1.4 1.4 1.4">
    <a-box position="0 1 0" width="0.7" height="1.2" depth="0.4" color="#2c3e50"></a-box>
    <a-sphere position="0 2.2 0" radius="0.4" color="#f1c27d"></a-sphere>

    <!-- face so you can tell direction -->
    <a-sphere position="-0.15 2.25 -0.35" radius="0.05" color="black"></a-sphere>
    <a-sphere position="0.15 2.25 -0.35" radius="0.05" color="black"></a-sphere>

    <a-cylinder position="-0.55 1.3 0" radius="0.08" height="0.8" rotation="0 0 25" color="#f1c27d"></a-cylinder>
    <a-cylinder position="0.55 1.3 0" radius="0.08" height="0.8" rotation="0 0 -25" color="#f1c27d"></a-cylinder>

    <a-cylinder position="-0.2 0.3 0" radius="0.1" height="0.7" color="#111"></a-cylinder>
    <a-cylinder position="0.2 0.3 0" radius="0.1" height="0.7" color="#111"></a-cylinder>
  </a-entity>

  <!-- BALL -->
  <a-sphere 
    id="ball"
    radius="0.5"
    src="#ballTexture"
    position="-1 1.4 0">
  </a-sphere>

</a-scene>

<script>
const ball = document.querySelector("#ball");

const start = {x: -1, y: 1.4, z: 0};
const hoop = {x: -13.1, y: 4, z: 0};

function shoot() {
  let t0 = performance.now();
  let duration = 1200;

  function animate(t) {
    let p = Math.min(1, (t - t0) / duration);

    let x = start.x + (hoop.x - start.x) * p;
    let z = start.z + (hoop.z - start.z) * p;
    let y = start.y + (hoop.y - start.y) * p + Math.sin(p * Math.PI) * 3;

    ball.setAttribute("position", {x, y, z});

    let spin = p * 1440;
    ball.setAttribute("rotation", {
      x: spin,
      y: spin / 2,
      z: spin
    });

    if (p < 1) {
      requestAnimationFrame(animate);
    } else {
      setTimeout(reset, 700);
    }
  }

  requestAnimationFrame(animate);
}

function reset() {
  ball.setAttribute("position", start);
  ball.setAttribute("rotation", "0 0 0");
  setTimeout(shoot, 800);
}

shoot();
</script>

</body>
</html>
